# Railway config-as-code (repo root).
# Builder must be RAILPACK or DOCKERFILE — "nixpacks" is invalid and breaks the build.
# Root requirements.txt includes backend via: -r backend/requirements.txt

[build]
builder = "RAILPACK"

[deploy]
startCommand = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
