<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MERIDIAN | AI Investment Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page: #07090D;
      --bg-card: #0C1118;
      --border-card: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.18);
      --gold: #C9A84C;
      --green: #2ECC71;
      --red: #E74C3C;
      --blue: #3B82F6;
      /* Readable on #07090D / #0C1118 (avoid near-black grays for text) */
      --text: #F2EDE4;
      --text-secondary: #B4BBC8;
      --text-muted: #8E97A8;
      --body-dim: #D8D2C8;
      --line-subtle: rgba(255, 255, 255, 0.16);
      --line-ring: rgba(255, 255, 255, 0.28);
      --header-bg: rgba(7, 9, 13, 0.97);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-page);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 15px;
      padding-top: 182px;
      padding-bottom: 48px;
    }
    .font-display { font-family: "Playfair Display", Georgia, serif; }
    .font-mono { font-family: "Space Mono", ui-monospace, monospace; }

    /* Scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--gold) #0a0e14;
    }
    *::-webkit-scrollbar { width: 4px; height: 4px; }
    *::-webkit-scrollbar-track { background: #0a0e14; }
    *::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 28px 14px;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-card);
    }
    .brand-block { display: flex; flex-direction: column; gap: 2px; }
    .brand-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--gold);
      margin: 0;
      line-height: 1.1;
    }
    .brand-sub {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }
    .header-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .dashboard-ticker-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      padding: 12px 0 14px;
      margin-bottom: 2px;
      border-bottom: 1px solid var(--line-subtle);
    }
    .dashboard-ticker-strip-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--gold);
      flex-shrink: 0;
    }
    .ticker-search {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 0;
      margin: 0;
      flex: 1 1 220px;
      min-width: 0;
    }
    .ticker-search input {
      flex: 1 1 160px;
      min-width: 140px;
      max-width: 280px;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--gold);
      background: rgba(201, 168, 76, 0.08);
      color: var(--text);
      font-family: "Space Mono", monospace;
      font-size: 13px;
      text-transform: uppercase;
      outline: none;
    }
    .ticker-search input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(201, 168, 76, 0.35);
    }
    .ticker-search input::placeholder { color: var(--text-muted); text-transform: none; letter-spacing: normal; }
    .header-meta {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 8px;
    }
    .header-meta span { color: var(--text); font-family: "Space Mono", monospace; font-size: 10px; }
    .btn {
      font-family: "DM Sans", sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .btn-gold {
      background: var(--gold);
      color: #07090D;
      border-color: var(--gold);
    }
    .btn-gold:hover { filter: brightness(1.08); }
    .btn-ghost {
      background: transparent;
      color: var(--text);
      border-color: var(--border-card);
    }
    .btn-ghost:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.03); }

    .status-strip {
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      z-index: 99;
      padding: 0 28px 8px;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .status-track {
      height: 3px;
      background: var(--line-subtle);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .status-track.running .status-fill {
      width: 35%;
      animation: statusSweep 1.1s ease-in-out infinite;
    }
    .status-fill {
      height: 100%;
      width: 0;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.25s ease;
    }
    @keyframes statusSweep {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(380%); }
    }
    .status-text {
      margin-top: 6px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-secondary);
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .main-wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 28px 0;
    }

    .critical-panel {
      display: none;
      margin-bottom: 20px;
      padding: 20px 24px;
      background: rgba(231, 76, 60, 0.06);
      border: 1px solid var(--border-card);
      border-left: 4px solid var(--red);
      border-radius: 10px;
    }
    .critical-panel.visible { display: block; }
    .critical-panel h2 {
      margin: 0 0 4px 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .critical-panel .sub {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .alert-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 14px;
      margin-bottom: 8px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-card);
      border-radius: 999px;
    }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
    .alert-ticker { font-family: "Space Mono", monospace; font-weight: 700; font-size: 13px; color: var(--gold); min-width: 56px; }
    .alert-body { flex: 1; min-width: 0; }
    .alert-headline { font-size: 12px; color: var(--text-secondary); line-height: 1.45; }
    .badge-ws {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-card);
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .badge-ws.blocked { border-color: rgba(231,76,60,0.5); color: var(--red); }
    .badge-ws.cleared { border-color: rgba(46,204,113,0.4); color: var(--green); }

    #recs { display: flex; flex-direction: column; gap: 20px; }

    .stock-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 10px;
      padding: 28px 32px;
      transition: border-color 0.2s ease;
    }
    .stock-card:hover { border-color: var(--border-hover); }

    .card-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 22px;
    }
    @media (max-width: 768px) {
      body { padding-top: 280px; }
      .site-header { flex-direction: column; align-items: flex-start; }
      .status-strip { top: auto; position: relative; padding-top: 8px; }
      .card-top { grid-template-columns: 1fr; text-align: left; }
      .card-top .price-block { text-align: left !important; }
    }

    .ticker-lg {
      font-family: "Space Mono", monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.1;
    }
    .company-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      margin-top: 4px;
    }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .pill {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-card);
      color: var(--text-secondary);
    }

    .score-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-ring-wrap { position: relative; width: 112px; height: 112px; }
    .score-ring-wrap svg { transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: var(--line-ring); stroke-width: 3; opacity: 1; }
    .score-ring-fg {
      fill: none;
      stroke: url(#scoreGrad);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease;
    }
    .score-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Space Mono", monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
    }

    .price-block { text-align: right; }
    .price-val {
      font-family: "Space Mono", monospace;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .price-chg { font-family: "Space Mono", monospace; font-size: 14px; font-weight: 600; margin-top: 6px; }
    .price-chg.up { color: var(--green); }
    .price-chg.down { color: var(--red); }
    .price-updated {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.04em;
    }

    .metrics-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 22px;
      -webkit-overflow-scrolling: touch;
    }
    .metric-pill {
      flex: 0 0 auto;
      min-width: 120px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border-card);
      border-radius: 8px;
    }
    .metric-pill .lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
    }
    .metric-pill .val {
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-top: 4px;
    }

    .breakdown { margin: 16px 0 20px; }
    .breakdown .sec-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .bar-row { margin-bottom: 8px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
    .bar-label span:last-child { font-family: "Space Mono", monospace; color: var(--text); }
    .bar-track { height: 3px; background: var(--line-subtle); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .bar-moat .bar-fill { background: var(--blue); }
    .bar-growth .bar-fill { background: #E67E22; }
    .bar-value .bar-fill { background: var(--gold); }
    .bar-momentum .bar-fill { background: var(--green); }

    .meridian-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      border-bottom: 1px solid var(--border-card);
      margin-bottom: 20px;
    }
    .meridian-tab {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 12px 16px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: "DM Sans", sans-serif;
      font-weight: 600;
    }
    .meridian-tab:hover { color: var(--body-dim); }
    .meridian-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .meridian-tab-panel { display: none; }
    .meridian-tab-panel.active { display: block; }

    .sec-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin: 0 0 10px 0;
    }
    .body-prose {
      font-size: 14px;
      line-height: 1.85;
      color: var(--body-dim);
    }
    .list-diamond { list-style: none; margin: 12px 0; padding: 0; }
    .list-diamond li {
      position: relative;
      padding-left: 1.15em;
      margin: 8px 0;
      font-size: 14px;
      line-height: 1.85;
      color: var(--body-dim);
    }
    .list-diamond li::before {
      content: "◆";
      position: absolute;
      left: 0;
      top: 0.35em;
      font-size: 0.45em;
      color: var(--gold);
    }
    .list-diamond.risk li::before { color: var(--red); }

    .lens-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .lens-card {
      padding: 16px 18px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      border-left-width: 4px;
    }
    .lens-card-detail {
      padding: 20px 22px 22px;
    }
    .lens-card .lname {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 0;
    }
    .lens-card .ltext { font-size: 13px; line-height: 1.75; color: var(--body-dim); }
    .lens-head { margin-bottom: 12px; }
    .lens-tagline {
      margin: 8px 0 0;
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-secondary);
    }
    .lens-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 14px;
      margin-bottom: 4px;
      padding: 14px 16px;
      background: rgba(0,0,0,0.22);
      border-radius: 8px;
      border: 1px solid var(--border-card);
    }
    @media (min-width: 520px) {
      .lens-stats { grid-template-columns: repeat(4, 1fr); }
    }
    .lens-stat-lbl {
      display: block;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .lens-stat-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .lens-section { margin-top: 16px; }
    .lens-section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin: 0 0 10px 0;
    }
    .lens-narrative {
      font-size: 13px;
      line-height: 1.85;
      color: var(--body-dim);
      margin: 0;
    }
    .lens-crit-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .lens-crit-list li {
      font-size: 13px;
      line-height: 1.6;
      color: var(--body-dim);
      padding: 10px 0;
      border-bottom: 1px solid var(--border-card);
    }
    .lens-crit-list li:last-child { border-bottom: none; }
    .lens-pf {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      margin-right: 8px;
    }
    .lens-pf.pass { color: var(--green); }
    .lens-pf.fail { color: var(--red); }
    .lens-crit-detail { color: var(--text-secondary); font-weight: 400; }
    .lens-meta {
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-secondary);
      margin: 0;
    }
    .lenses-intro {
      font-size: 14px;
      line-height: 1.8;
      color: var(--body-dim);
      margin: 0 0 18px 0;
      max-width: 900px;
    }
    .lens-deep {
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.025);
    }
    .lens-prose-long {
      font-size: 13px;
      line-height: 1.92;
      color: var(--body-dim);
      margin: 0 0 14px 0;
    }
    .lens-blend-eq {
      font-family: "Space Mono", ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.28);
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid var(--border-card);
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .lens-driver-list {
      margin: 0 0 0 1.1em;
      padding: 0;
      color: var(--body-dim);
      font-size: 13px;
      line-height: 1.8;
    }
    .lens-driver-list li { margin: 6px 0; }
    .lens-verdict {
      font-size: 13px;
      line-height: 1.85;
      color: var(--text);
      margin: 0;
      padding: 14px 16px;
      background: rgba(201, 168, 76, 0.08);
      border-left: 3px solid var(--gold);
      border-radius: 0 8px 8px 0;
    }
    .lens-verdict-warn {
      background: rgba(231, 76, 60, 0.09);
      border-left-color: var(--red);
    }
    .lens-digest {
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-secondary);
      margin: 0 0 12px 0;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
    }
    .lens-digest-fail { color: var(--red); font-weight: 600; }
    .lens-rerun-hint {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-secondary);
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px dashed var(--border-hover);
      margin-bottom: 12px;
    }

    .empty-card {
      padding: 40px;
      text-align: center;
      color: var(--text-secondary);
      border: 1px dashed var(--border-card);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="brand-block">
      <h1 class="brand-name">MERIDIAN</h1>
      <div class="brand-sub">AI Investment Intelligence</div>
    </div>
    <div class="header-actions">
      <div class="header-meta">Last run <span id="lastRun">__LAST_RUN__</span></div>
      <button type="button" class="btn btn-gold" onclick="runFull()">Run Full Analysis</button>
      <button type="button" class="btn btn-ghost" onclick="loadRecs()">Refresh</button>
      <button type="button" class="btn btn-ghost" onclick="window.location='/logout'">Logout</button>
    </div>
  </header>

  <div class="status-strip">
    <div class="dashboard-ticker-strip" aria-label="Analyze any ticker">
      <span class="dashboard-ticker-strip-label">Look up any ticker</span>
      <form class="ticker-search" onsubmit="searchTicker(event)">
        <input id="tickerSearchInput" type="text" maxlength="12" placeholder="e.g. NFLX, AMD, BRK-B" autocomplete="off" />
        <button type="submit" class="btn btn-gold">Analyze ticker</button>
      </form>
    </div>
    <div class="status-track" id="statusTrack">
      <div class="status-fill" id="statusFill"></div>
    </div>
    <div class="status-text" id="statusText">Ready</div>
  </div>

  <main class="main-wrap">
    <div id="criticalPanel" class="critical-panel"></div>
    <div id="recs"></div>
  </main>

  <svg width="0" height="0" aria-hidden="true">
    <defs>
      <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#C9A84C" />
        <stop offset="100%" stop-color="#2ECC71" />
      </linearGradient>
    </defs>
  </svg>

<script>
function formatUsDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso).slice(0, 10);
  return d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}
function formatQuoteUpdated(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
}
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/"/g, "&quot;");
}
function toTen(v) {
  const n = Number(v);
  if (!Number.isFinite(n)) return 0;
  return Math.min(10, Math.max(0, Math.round((n / 10) * 10) / 10));
}
function workflowBadge(ws) {
  const labels = { blocked: "Blocked", unblocked: "Cleared", under_review: "Under review", confirmed: "Confirmed" };
  const cls = ws === "blocked" ? "blocked" : ws === "unblocked" ? "cleared" : "";
  return '<span class="badge-ws ' + cls + '">' + esc(labels[ws] || ws || "—") + "</span>";
}
function confidenceLabel(c) {
  if (!c || c === "unknown") return "";
  const t = String(c).replace(/_/g, " ");
  return t.charAt(0).toUpperCase() + t.slice(1);
}

function fmtLensNum(v, digits) {
  if (v === null || v === undefined) return "—";
  const n = Number(v);
  if (!Number.isFinite(n)) return "—";
  return n.toFixed(digits);
}

function buildDetailedLensCard(L, ps, checklist, contributions, weights, reasoningLines, finalScore, elaborationByLens) {
  const key = L.key;
  const E = elaborationByLens && elaborationByLens[key] ? elaborationByLens[key] : null;
  const raw = ps[key];
  const w = weights && weights[key] != null ? Number(weights[key]) : null;
  const contrib = contributions && contributions[key] != null ? Number(contributions[key]) : null;
  const fs = Number(finalScore);
  const pctOfFinal =
    fs > 0 && contrib != null && Number.isFinite(contrib) ? (contrib / fs) * 100 : null;

  let narrative = "";
  if (L.reasoningIndex >= 0 && reasoningLines[L.reasoningIndex]) {
    narrative = reasoningLines[L.reasoningIndex];
  } else if (key === "pelosi_proxy") {
    narrative =
      "This lens applies a lightweight heuristic inspired by public trade-disclosure patterns. It carries a small fixed weight in the blended score and does not use the same pass/fail checklist as fundamental lenses. Treat it as secondary context next to filing-based Buffett / Ackman / Wood / Burry / Institutional signals.";
  } else {
    const sc = ps[key];
    narrative =
      "No filing-linked narrative string was returned for " +
      L.label +
      " in this payload. Raw lens score: " +
      (sc != null && Number.isFinite(Number(sc)) ? Number(sc).toFixed(2) : "—") +
      ". Run a fresh full analysis to regenerate persona commentary.";
  }

  const ck = checklist || {};
  const items = key === "pelosi_proxy" ? [] : ck[key] || [];

  let digestHtml = "";
  if (E && E.checklist_digest && items.length) {
    const dg = E.checklist_digest;
    digestHtml =
      '<div class="lens-digest">Gate tally: <strong>' +
      esc(String(dg.pass_count)) +
      "</strong> pass, <strong>" +
      esc(String(dg.fail_count)) +
      "</strong> fail." +
      (dg.failed_criteria && dg.failed_criteria.length
        ? ' Pressure points: <span class="lens-digest-fail">' + esc(dg.failed_criteria.join("; ")) + "</span>."
        : "") +
      "</div>";
  }

  let criteriaBlock = "";
  if (items.length) {
    criteriaBlock =
      '<div class="lens-section"><p class="lens-section-title">Pass / fail vs thresholds (latest filing metrics)</p>' +
      digestHtml +
      '<ul class="lens-crit-list">';
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      const ok = it.pass;
      criteriaBlock +=
        '<li><span class="lens-pf ' +
        (ok ? "pass" : "fail") +
        '">' +
        (ok ? "PASS" : "FAIL") +
        "</span><strong>" +
        esc(it.criterion) +
        '</strong><span class="lens-crit-detail"> — observed <span class="font-mono">' +
        esc(fmtLensNum(it.actual, 2)) +
        "</span>, requires " +
        esc(it.comparator || "—") +
        ' <span class="font-mono">' +
        esc(fmtLensNum(it.threshold, 2)) +
        "</span></span></li>";
    }
    criteriaBlock += "</ul></div>";
  } else {
    criteriaBlock =
      '<div class="lens-section"><p class="lens-section-title">Pass / fail vs thresholds (latest filing metrics)</p><p class="lens-meta">' +
      (key === "pelosi_proxy"
        ? "No checklist rows: this lens only contributes its weighted score to the final blend."
        : "No criteria rows were returned for this lens.") +
      "</p></div>";
  }

  const statsRow =
    '<div class="lens-stats">' +
    '<div class="lens-stat"><span class="lens-stat-lbl">Lens score (0–100)</span><span class="lens-stat-val font-mono">' +
    fmtLensNum(raw, 2) +
    "</span></div>" +
    '<div class="lens-stat"><span class="lens-stat-lbl">Blend weight</span><span class="lens-stat-val font-mono">' +
    (w != null && Number.isFinite(w) ? (w * 100).toFixed(1) + "%" : "—") +
    "</span></div>" +
    '<div class="lens-stat"><span class="lens-stat-lbl">Weighted points</span><span class="lens-stat-val font-mono">' +
    (contrib != null && Number.isFinite(contrib) ? fmtLensNum(contrib, 2) + " pts" : "—") +
    "</span></div>" +
    '<div class="lens-stat"><span class="lens-stat-lbl">Share of final</span><span class="lens-stat-val font-mono">' +
    (pctOfFinal != null && Number.isFinite(pctOfFinal) ? pctOfFinal.toFixed(1) + "%" : "—") +
    "</span></div>" +
    "</div>";

  let deepDive = "";
  if (E) {
    const drivers = (E.driver_lines || []).map((line) => "<li>" + esc(line) + "</li>").join("");
    const kw = E.keyword_note
      ? '<div class="lens-section"><p class="lens-section-title">Filing text cross-read</p><p class="lens-prose-long">' +
        esc(E.keyword_note) +
        "</p></div>"
      : "";
    const fails = E.checklist_digest && E.checklist_digest.fail_count > 0 && items.length;
    const verdictCls = fails ? "lens-verdict lens-verdict-warn" : "lens-verdict";
    deepDive =
      '<div class="lens-deep">' +
      '<div class="lens-section"><p class="lens-section-title">Investment read (what this lens judges)</p><p class="lens-prose-long">' +
      esc(E.measures || "") +
      "</p></div>" +
      '<div class="lens-section"><p class="lens-section-title">Scoring mechanics (matches engine code)</p><p class="lens-prose-long">' +
      esc(E.formula || "") +
      "</p></div>" +
      '<div class="lens-section"><p class="lens-section-title">Blend arithmetic</p><pre class="lens-blend-eq">' +
      esc(E.blend_equation || "") +
      "</pre></div>" +
      (drivers
        ? '<div class="lens-section"><p class="lens-section-title">Line-by-line drivers (latest period)</p><ol class="lens-driver-list">' +
          drivers +
          "</ol></div>"
        : "") +
      '<div class="lens-section"><p class="lens-section-title">Checklist narrative</p><p class="' +
      verdictCls +
      '">' +
      esc(E.checklist_verdict || "") +
      "</p></div>" +
      '<div class="lens-section"><p class="lens-section-title">Multi-year arc (10-K trend strip)</p><p class="lens-prose-long">' +
      esc(E.trend_paragraph || "") +
      "</p></div>" +
      kw +
      "</div>";
  } else {
    deepDive =
      '<div class="lens-rerun-hint">Expanded lens dossier is not stored on this recommendation row yet. Run <strong>Full Analysis</strong> once to generate long-form briefs (drivers, multi-year copy, filing keyword cross-reads).</div>';
  }

  return (
    '<article class="lens-card lens-card-detail" style="border-left-color:' +
    L.color +
    '">' +
    '<header class="lens-head">' +
    '<div class="lname" style="color:' +
    L.color +
    '">' +
    esc(L.label) +
    "</div>" +
    '<p class="lens-tagline">' +
    esc(L.tagline) +
    "</p>" +
    "</header>" +
    statsRow +
    deepDive +
    '<div class="lens-section"><p class="lens-section-title">Engine voice (compact snapshot)</p><p class="lens-narrative">' +
    esc(narrative) +
    "</p></div>" +
    criteriaBlock +
    "</article>"
  );
}

function setStatusRunning(on) {
  document.getElementById("statusTrack").classList.toggle("running", on);
}
function setStatusMsg(text) {
  document.getElementById("statusText").textContent = text;
}

function normalizeTickerInput(value) {
  const raw = String(value || "").trim().toUpperCase();
  return raw.replace(/[^A-Z0-9.-]/g, "");
}

async function searchTicker(evt) {
  if (evt) evt.preventDefault();
  const input = document.getElementById("tickerSearchInput");
  const ticker = normalizeTickerInput(input.value);
  if (!ticker) {
    setStatusMsg("Enter a valid ticker symbol (e.g., NFLX, AMD, BRK-B).");
    return;
  }
  input.value = ticker;
  setStatusRunning(true);
  setStatusMsg("Analyzing " + ticker + " using investor lenses");
  try {
    const res = await fetch("/analysis/run-any/" + encodeURIComponent(ticker), { method: "POST" });
    const data = await res.json();
    if (!res.ok) {
      setStatusMsg((data && (data.detail || data.message)) || ("Failed to analyze " + ticker));
      return;
    }
    setStatusMsg(data.message || ("Analysis completed for " + ticker));
    await loadRecs();
  } catch (err) {
    setStatusMsg("Failed to analyze " + ticker + ". Check network/server logs.");
  } finally {
    setStatusRunning(false);
  }
}

async function runFull() {
  setStatusRunning(true);
  setStatusMsg("Running full pipeline");
  const res = await fetch("/run/full", { method: "POST" });
  const data = await res.json();
  let line = data.message || "Done";
  if (data.failures && data.failures.length) {
    line += "\n\nErrors (preview):\n" + data.failures.slice(0, 8).join("\n");
  }
  setStatusRunning(false);
  setStatusMsg(line);
  await loadRecs();
}

function renderCriticalAlerts(alerts) {
  const panel = document.getElementById("criticalPanel");
  if (!alerts || !alerts.length) {
    panel.classList.remove("visible");
    panel.innerHTML = "";
    return;
  }
  panel.classList.add("visible");
  const rows = alerts.map((a) => {
    const conf = confidenceLabel(a.confidence);
    const confHtml = conf ? '<span class="badge-ws" style="margin-left:8px">' + esc(conf) + "</span>" : "";
    return (
      '<div class="alert-row">' +
      '<span class="alert-dot"></span>' +
      '<span class="alert-ticker">' + esc(a.ticker) + "</span>" +
      '<div class="alert-body">' +
      '<div class="alert-headline">' + esc(a.headline || a.event_type || "") + "</div>" +
      "</div>" +
      workflowBadge(a.workflow_status) +

async function loadRecs() {
  const [recRes, watchRes, alertsRes] = await Promise.all([
    fetch("/recommendations?status=recommended"),
    fetch("/recommendations?status=watchlist"),
    fetch("/alerts/critical?limit=15"),
  ]);
  const alerts = await alertsRes.json();
  renderCriticalAlerts(Array.isArray(alerts) ? alerts : []);

  const recommended = await recRes.json();
  const watchlist = await watchRes.json();
  const byTicker = new Map();
  for (const r of [...recommended, ...watchlist]) {
    const cur = byTicker.get(r.ticker);
    if (!cur) {
      byTicker.set(r.ticker, r);
      continue;
    }
    if (cur.status !== "recommended" && r.status === "recommended") {
      byTicker.set(r.ticker, r);
    } else if (Number(r.final_score) > Number(cur.final_score)) {
      byTicker.set(r.ticker, r);
    }
  }
  const data = Array.from(byTicker.values()).sort((a, b) => Number(b.final_score) - Number(a.final_score));
  const target = document.getElementById("recs");
  if (!data.length) {
    target.innerHTML = '<div class="empty-card">No recommendations or watchlist rows yet. Run full analysis.</div>';
    return;
  }

  const detailed = await Promise.all(
    data.map(async (r) => {
      const dr = await fetch("/recommendations/" + r.ticker);
      const detail = await dr.json();
      return { ...r, detail };
    })
  );

  document.getElementById("lastRun").textContent = formatUsDate(data[0].as_of);

  target.innerHTML = detailed.map((item) => buildCard(item)).join("");
}

  const tabRisk =
    '<div class="meridian-tab-panel" data-tab="risk" role="tabpanel">' +
    '<p class="sec-label">Principal risks</p>' +
    '<ul class="list-diamond risk">' +
    (risks.length ? risks.map((x) => "<li>" + esc(x) + "</li>").join("") : "<li>No principal risks listed.</li>") +
    "</ul></div>";

  const tabSec =
    '<div class="meridian-tab-panel" data-tab="sec" role="tabpanel">' +
    '<p class="sec-label">Filings & context</p>' +
    '<ul class="list-diamond">' +
    "<li>10-K fiscal years: <span class=\"font-mono\">" +
    esc(filingYears.join(", ") || "N/A") +
    "</span></li>" +
    "<li>Word signals — risk <span class=\"font-mono\">" +
    esc(filingWords.risk || 0) +
    "</span>, litigation <span class=\"font-mono\">" +
    esc(filingWords.litigation || 0) +
    "</span>, growth <span class=\"font-mono\">" +
    esc(filingWords.growth || 0) +
    "</span>, AI <span class=\"font-mono\">" +
    esc(filingWords.ai || 0) +
    "</span>, debt <span class=\"font-mono\">" +
    esc(filingWords.debt || 0) +
    "</span></li>" +
    "<li>Analyst context <span class=\"font-mono\">" +
    esc(context.analyst_consensus_score ?? "N/A") +
    "</span></li>" +
    "<li>News risk <span class=\"font-mono\">" +
    esc(context.news_risk_score ?? "N/A") +
    "</span></li>" +
    "<li>Search interest <span class=\"font-mono\">" +
    esc(context.search_interest_score ?? "N/A") +
    "</span></li>" +
    "</ul>" +
    '<p class="sec-label">Why recommended</p>' +
    '<ul class="list-diamond">' +
    whyNow.map((x) => "<li>" + esc(x) + "</li>").join("") +
    "</ul>" +
    '<p class="sec-label">Three-year trend</p>' +
    trendHtml +
    '<p class="sec-label">Lens criteria</p>' +
    checklistHtml +
    newsBlock +
    "</div>";

  return (
    '<article class="stock-card" data-ticker="' +
    esc(item.ticker) +
    '">' +
    '<div class="card-top">' +
    "<div>" +
    '<div class="ticker-lg">' +
    esc(item.ticker) +
    "</div>" +
    '<div class="company-name">' +
    esc(d.company_name || item.ticker) +
    "</div>" +
    '<div class="pill-row">' +
    '<span class="pill">' +
    esc(sectorPill) +
    "</span>" +
    '<span class="pill">' +
    esc(horizonPill) +
    "</span>" +
    '<span class="pill">' +
    esc(item.status) +
    "</span>" +
    "</div></div>" +
    '<div class="score-center">' +
    '<div class="score-ring-wrap">' +
    "<svg width=\"112\" height=\"112\" viewBox=\"0 0 112 112\">" +
    '<circle class="score-ring-bg" cx="56" cy="56" r="44" />' +
    '<circle class="score-ring-fg" cx="56" cy="56" r="44" stroke-dasharray="' +
    ringCirc +
    '" style="stroke-dashoffset:' +
    arcOff +
    '" />' +
    "</svg>" +
    '<div class="score-num">' +
    esc(item.final_score.toFixed(2)) +
    "</div></div>" +
    '<div style="font-size:9px;text-transform:uppercase;letter-spacing:0.2em;color:#8E97A8;margin-top:6px">Blended</div>' +
    "</div>" +
    '<div class="price-block">' +
    '<div class="price-val">' +
    esc(priceLine) +
    "</div>" +
    '<div class="price-chg ' +
    chgClass +
    '">' +
    esc(chgStr) +
    "</div>" +
    '<div class="price-updated">' +
    (quoteWhen ? "Last updated " + esc(quoteWhen) : "") +
    "</div></div></div>" +
    '<div class="metrics-scroll">' +
    metricPill("Revenue", compactMoney(keyFinancials.revenue)) +
    metricPill("FCF", compactMoney(keyFinancials.fcf)) +
    metricPill("Rev growth", pct(keyFinancials.revenue_growth_pct)) +
    metricPill("Op margin", pct(keyFinancials.operating_margin)) +
    metricPill("ROE", pct(keyFinancials.roe)) +
    "</div>" +
    tabBar +
    tabExec +
    tabWhy +
    tabLenses +
    tabRisk +
    tabSec +
    "</article>"
  );
}

function metricPill(lbl, val) {
  return (
    '<div class="metric-pill"><div class="lbl">' +
    esc(lbl) +
    '</div><div class="val">' +
    esc(val) +
    "</div></div>"
  );
}

function barRow(label, val10, cls) {
  const pctW = Math.min(100, (val10 / 10) * 100);
  return (
    '<div class="bar-row ' +
    cls +
    '"><div class="bar-label"><span>' +
    esc(label) +
    '</span><span>' +
    esc(val10.toFixed(1)) +
    " / 10</span></div>" +
    '<div class="bar-track"><div class="bar-fill" style="width:' +
    pctW +
    '%"></div></div></div>'
  );
}

window.loadRecs = loadRecs;
loadRecs();
</script>
</body>
</html>
