services:
  - type: web
    name: ai-investment-analyst
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: SEC_USER_AGENT
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ai-investment-analyst-db
          property: connectionString
      - key: AUTH_ENABLED
        value: "true"
      - key: AUTH_USERNAME
        value: "admin"
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTO_REFRESH_ENABLED
        value: "true"
      - key: AUTO_REFRESH_INTERVAL_MINUTES
        value: "15"
      - key: RISK_BLOCK_MIN_CONFIDENCE
        value: "medium"

databases:
  - name: ai-investment-analyst-db
    plan: starter
