version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /workspace/backend
    volumes:
      - ../backend:/workspace/backend
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
